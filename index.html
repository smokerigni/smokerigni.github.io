<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>smokerigni.github.io</title>
    <meta name="description" content="Simple Github website." />
    <style>
      html, body, div, span, a, p, ul, li, h1, code, nav {
        margin: 0;
        border: 0;
        padding: 0;
        box-sizing: inherit;
        font: inherit;
        text-decoration: inherit;
        text-align: inherit;
        color: inherit;
        background: transparent;
      }
      html, body { height: 100%; }
      html { background-color: rgb(0, 120, 0); }
      #root { background-color: #F0F0F0; min-height: 100%; }
      body { overflow-x: hidden; }
    </style>

    <link rel="stylesheet" href="/src/static/normalize.css" media="screen" />

    <link rel="apple-touch-icon" sizes="180x180" href="/src/static/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/src/static/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/src/static/favicon-16x16.png" />
    <link rel="manifest" href="/src/static/site.webmanifest" />
    <link rel="shortcut icon" href="/src/static/favicon.ico" />
    <meta name="msapplication-TileColor" content="#2b5797" />
    <meta name="msapplication-TileImage" content="/src/static/mstile-144x144.png" />
    <meta name="msapplication-config" content="/src/static/browserconfig.xml" />
    <meta name="theme-color" content="#ffffff" />
    
    <meta property="og:image:width" content="279" />
    <meta property="og:image:height" content="279" />
    <meta property="og:description" content="My Github wbesite. No more." />
    <meta property="og:url" content="http://smokerigni.github.io" />
    <meta property="og:image" content="http://smokerigni.github.io/src/static/og-image.jpg" />
    <meta property="og:title" content="smokerigni.github.io" />

    <script type="text/javascript">
      (function(l) {
        if (l.search) {
          var q = {}
          l.search.slice(1).split('&').forEach(function(v) {
            var a = v.split('=');
            q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
          })
          if (q.p !== undefined) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (q.p || '') +
              (q.q ? ('?' + q.q) : '') +
              l.hash
            )
          }
        }
      }(window.location))
    </script>
  </head>
  <body>
    <main id="root"></main>
    <script type="application/javascript" src="/build/bundle.js"></script>
  </body>
</html>
